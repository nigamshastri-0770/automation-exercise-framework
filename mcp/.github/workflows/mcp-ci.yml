
name: MCP CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start MCP Server
        run: |
          node mcp/server.js &
          sleep 5

      - name: Run MCP Client
        run: node mcp/client.js

      - name: Run Playwright tests (fallback)
        run: npx playwright test || true
